name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: qinglion-registry.cn-hangzhou.cr.aliyuncs.com
  IMAGE_NAME: qinglion/sengclaw

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

      - name: Trigger dokploy redeploy
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_DEPLOY_URL: ${{ secrets.DOKPLOY_DEPLOY_URL }}
        run: |
          if [ -n "$DOKPLOY_DEPLOY_URL" ]; then
            echo "🚀 Triggering dokploy redeploy..."
            curl -X GET "$DOKPLOY_DEPLOY_URL"
          else
            echo "⏭️  Skipping dokploy redeploy (DOKPLOY_DEPLOY_URL not set)"
          fi
